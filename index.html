<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pokemon</title>
        <style>
        body {
            margin: 0;
            height: 100vh;
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #ffcb05, #3b4cca);
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .container {
            background-color: white;
            padding: 30px;
            border-radius: 15px;
            text-align: center;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.2);
            width: 300px;
        }

        h1 {
            color: #3b4cca;
            margin-bottom: 20px;
        }

        input {
            width: 90%;
            padding: 10px;
            font-size: 16px;
            border: 2px solid #3b4cca;
            border-radius: 8px;
            outline: none;
            margin-bottom: 15px;
        }

        button {
            padding: 10px 20px;
            font-size: 16px;
            background-color: #ffcb05;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
        }

        button:hover {
            background-color: #f2b807;
        }

        img {
            margin-top: 20px;
            width: 150px;
            height: 150px;
        }
    </style>
</head>
<body>
    <input type="text" id="pokemonName" placeholder="Enter a Pokemon name">
    <button onclick="fetchData()">Search</button>

    <img src="" alt="Pokemon Sprite" id="pokemonSprite" style="display: none;">
    
    <script src="index.js"></script>
</body>
</html>
